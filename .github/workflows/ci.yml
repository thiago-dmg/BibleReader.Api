name: CI

# Só em PR — evita duplicar com "Deploy API to VPS" em cada push para main.
on:
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore BibleReader.Api.csproj

      - name: Build
        run: dotnet build BibleReader.Api.csproj -c Release --no-restore

      - name: Publish (smoke)
        run: dotnet publish BibleReader.Api.csproj -c Release -o publish --no-restore
