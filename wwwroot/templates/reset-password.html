<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redefinir senha - Bíblia Reader</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #F7F2FF 0%, #FCFAFF 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: #2F2A3A;
        }
        .card {
            width: 100%;
            max-width: 430px;
            background: #fff;
            border: 1px solid #EEE7FF;
            border-radius: 24px;
            padding: 32px 28px;
            box-shadow: 0 10px 30px rgba(76, 45, 131, 0.10);
            text-align: center;
        }
        .brand {
            margin-bottom: 12px;
            font-size: 24px;
            font-weight: 700;
            color: #4B2E83;
        }
        .subtitle {
            color: #655D74;
            margin-bottom: 22px;
            line-height: 1.5;
        }
        .input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #DDD3FF;
            border-radius: 14px;
            font-size: 15px;
            outline: none;
            margin-bottom: 14px;
        }
        .btn {
            width: 100%;
            padding: 14px 20px;
            border: 0;
            border-radius: 14px;
            background: #6C4DFF;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }
        .btn:hover { background: #5B3EF0; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">Bíblia Reader</div>
        <p class="subtitle">Digite sua nova senha para continuar.</p>

        <form method="post" action="/v1/auth/reset-password">
            <input type="hidden" name="Token" value="{{TOKEN}}" />
            <input class="input" type="password" name="NewPassword" placeholder="Nova senha" required />
            <button class="btn" type="submit">Redefinir senha</button>
        </form>
    </div>
</body>
</html>
